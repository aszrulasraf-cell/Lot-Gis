<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Sistem Maklumat Lot Tanah Politeknik</title>

        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">

        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                overflow: hidden;
                font-family: 'Segoe UI', Roboto, sans-serif;
                background-color: #000;
            }

            /* --- TOP HEADER (Seperti Gambar) --- */
            header {
                height: 60px;
                background-color: #2d5a27; /* Hijau gelap Politeknik */
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                position: relative;
                z-index: 1002;
                border-bottom: 2px solid #1e3d1a;
            }

            .logo-header {
                background: white;
                padding: 5px 15px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo-header img {
                height: 30px;
            }

            .site-title {
                font-family: 'Brush Script MT', cursive;
                font-size: 24px;
                color: #2d5a27;
            }

            /* --- MAIN LAYOUT --- */
            #main-container {
                display: flex;
                height: calc(100vh - 60px);
                width: 100%;
            }

            #map {
                flex-grow: 1;
                height: 100%;
            }

            /* --- SIDEBAR DARK STYLE (Seperti Gambar) --- */
            #sidebar {
                width: 320px;
                background: #1a1c23; /* Dark mode background */
                color: #ecf0f1;
                padding: 20px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                gap: 15px;
                z-index: 1001;
                border-left: 1px solid #333;
            }

            .sidebar-section {
                background: #262936;
                padding: 15px;
                border-radius: 8px;
            }

            .section-title {
                font-size: 14px;
                font-weight: bold;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
                color: #fff;
            }

            /* --- SEARCH BOX & BUTTONS --- */
            .search-container input {
                width: 100%;
                padding: 10px;
                background: #12141a;
                border: 1px solid #444;
                color: white;
                border-radius: 4px;
                margin-bottom: 10px;
            }

            .btn {
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                margin-bottom: 8px;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .btn-search { background: #27ae60; }
            .btn-reset { background: #c0392b; }
            .btn-export { background: #2980b9; }

            /* --- INFO DISPLAY --- */
            .data-item {
                margin-bottom: 15px;
            }

            .data-label {
                font-size: 10px;
                color: #95a5a6;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .data-value {
                font-size: 14px;
                font-weight: bold;
                color: #2ecc71; /* Hijau terang untuk data */
                margin-top: 4px;
            }

            /* Leaflet Overrides */
            .leaflet-bar { border: none !important; }
        </style>
    </head>
    <body>

        <header>
            <div class="logo-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Logo_Politeknik_Malaysia.png/600px-Logo_Politeknik_Malaysia.png" alt="Poli">
                <span class="site-title">smart resident</span>
            </div>
        </header>

        <div id="main-container">
            <div id="map"></div>

            <div id="sidebar">
                <div class="section-title">
                    <i class="fas fa-cog"></i> Tetapan Paparan
                </div>

                <div class="sidebar-section">
                    <div class="section-title">
                        <i class="fas fa-globe"></i> Land Explorer
                    </div>
                    
                    <div class="search-container">
                        <input type="text" id="searchBox" placeholder="Masukkan No Lot...">
                        <button class="btn btn-search" onclick="searchLot()"><i class="fas fa-search"></i> Cari Lot</button>
                        <button class="btn btn-reset" onclick="location.reload()"><i class="fas fa-sync"></i> Reset Peta</button>
                        <button class="btn btn-export" onclick="window.print()"><i class="fas fa-file-pdf"></i> Export Detail + Map (PDF)</button>
                    </div>
                </div>

                <div class="sidebar-section" id="data-display">
                    <div class="data-item">
                        <div class="data-label">Status Pilihan</div>
                        <div class="data-value" style="color: #e67e22;">Sila Pilih Lot Tanah</div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/bklmerge_0.js"></script>
        <script src="data/finallot_1.js"></script>

        <script>
            var map = L.map('map', {
                zoomControl: true, 
                maxZoom: 28, 
                minZoom: 1
            }).fitBounds([[2.1025299883076296,102.52069200782941],[2.104789313408464,102.52465447473166]]);

            // Google Satellite Default
            var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Satellite'
            }).addTo(map);

            function highlightFeature(e) {
                var layer = e.target;
                layer.setStyle({
                    weight: 4,
                    color: '#f1c40f', // Kuning seperti di rujukan Simply Stay
                    fillOpacity: 0.7
                });
            }

            function resetHighlight(e) {
                layer_finallot_1.resetStyle(e.target);
            }

            function onEachFeature(feature, layer) {
                layer.on({
                    mouseover: highlightFeature,
                    mouseout: resetHighlight,
                    click: function(e) {
                        var props = feature.properties;
                        
                        // Kemaskini Sidebar dengan detail (Seperti Gambar 1)
                        var detailHtml = `
                            <div class="data-item">
                                <div class="data-label">TOTAL LOT</div>
                                <div class="data-value">67</div> </div>
                            <div class="data-item">
                                <div class="data-label">NO LOT DIPILIH</div>
                                <div class="data-value">${props.NO_LOT || 'N/A'}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">NO PA</div>
                                <div class="data-value">${props.NO_PA || 'N/A'}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">NAMA PEMILIK</div>
                                <div class="data-value">POLITEKNIK MALAYSIA</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">LUAS LOT</div>
                                <div class="data-value">${props.AREA || '0'} HA</div>
                            </div>
                        `;
                        document.getElementById('data-display').innerHTML = detailHtml;
                        
                        // Popup seperti Gambar 2 (Simply Stay)
                        var popupContent = `
                            <div style="font-size:12px; line-height:1.5;">
                                <strong>LOT FINAL</strong><hr>
                                No Lot: ${props.NO_LOT}<br>
                                PA: ${props.NO_PA}<br>
                                <span style="color:#7f8c8d; font-size:10px;">${props['tsp — ha'] || ''}</span>
                            </div>
                        `;
                        layer.bindPopup(popupContent).openPopup();
                        map.flyTo(e.latlng, 19);
                    }
                });
            }

            map.createPane('pane_finallot_1');
            map.getPane('pane_finallot_1').style.zIndex = 401;

            var layer_finallot_1 = new L.geoJson(json_finallot_1, {
                pane: 'pane_finallot_1',
                onEachFeature: onEachFeature,
                style: {
                    opacity: 1,
                    color: '#2ecc71', // Garisan hijau cerah seperti gambar
                    weight: 2,
                    fill: true,
                    fillOpacity: 0.4,
                    fillColor: '#2ecc71',
                    interactive: true
                }
            }).addTo(map);

            // Fungsi Search manual untuk butang "Cari Lot"
            function searchLot() {
                var val = document.getElementById('searchBox').value;
                layer_finallot_1.eachLayer(function(layer) {
                    if (layer.feature.properties.NO_LOT == val) {
                        map.flyTo(layer.getBounds().getCenter(), 19);
                        layer.fire('click');
                    }
                });
            }
        </script>
    </body>
</html>
