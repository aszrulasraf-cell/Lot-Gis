<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Sistem Maklumat Lot Tanah Politeknik</title>

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">

        <style>
            :root {
                --primary: #10b981; /* Emerald Green */
                --primary-dark: #059669;
                --bg-dark: #0f172a;
                --sidebar-bg: rgba(30, 41, 59, 0.8);
                --card-bg: rgba(51, 65, 85, 0.5);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
            }

            html, body {
                width: 100%; height: 100%; padding: 0; margin: 0;
                overflow: hidden; font-family: 'Inter', sans-serif;
                background-color: var(--bg-dark);
                color: var(--text-main);
            }

            /* --- HEADER MODERN --- */
            header {
                height: 70px; 
                background: linear-gradient(90deg, #064e3b 0%, #065f46 100%);
                display: flex; align-items: center; padding: 0 30px;
                z-index: 1002; position: relative;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            }

            .header-box {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                padding: 8px 25px; border-radius: 50px;
                display: flex; align-items: center; gap: 15px;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            .header-box img { height: 32px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }

            .site-title {
                font-size: 20px; font-weight: 700; color: white;
                letter-spacing: 1px; text-transform: uppercase;
            }

            /* --- LAYOUT --- */
            #main-container { display: flex; height: calc(100vh - 70px); width: 100%; }
            #map { flex-grow: 1; height: 100%; background: #020617; }

            /* --- SIDEBAR GLASSMORPHISM --- */
            #sidebar {
                width: 350px; background: var(--sidebar-bg);
                backdrop-filter: blur(15px);
                padding: 25px; display: flex; flex-direction: column; gap: 20px;
                z-index: 1001; border-left: 1px solid rgba(255,255,255,0.1);
                overflow-y: auto;
            }

            .sidebar-section { 
                background: var(--card-bg); 
                padding: 20px; border-radius: 16px;
                border: 1px solid rgba(255,255,255,0.05);
                transition: transform 0.2s;
            }

            .section-header { 
                font-size: 14px; font-weight: 600; margin-bottom: 15px; 
                display: flex; align-items: center; gap: 10px; color: var(--primary);
                text-transform: uppercase; letter-spacing: 1px;
            }

            /* --- DATA DISPLAY --- */
            .data-item { margin-bottom: 15px; }
            .data-label { font-size: 10px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; }
            .data-value { 
                font-size: 16px; font-weight: 600; color: #fff; 
                padding: 8px 12px; background: rgba(0,0,0,0.2); border-radius: 8px;
            }
            .highlight { color: var(--primary); }

            /* --- INPUT & BUTTONS --- */
            input#searchBox { 
                width: 100%; padding: 12px 15px; background: rgba(15, 23, 42, 0.6); 
                border: 1px solid rgba(255,255,255,0.1); color: #fff; 
                border-radius: 10px; margin-bottom: 12px; box-sizing: border-box;
                transition: border 0.3s;
            }
            input#searchBox:focus { outline: none; border-color: var(--primary); }

            .btn { 
                width: 100%; padding: 12px; border: none; border-radius: 10px; 
                cursor: pointer; font-weight: 600; margin-bottom: 10px; 
                display: flex; align-items: center; justify-content: center; gap: 10px;
                transition: all 0.3s ease;
            }

            .btn-search { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
            .btn-search:hover { background: var(--primary-dark); transform: translateY(-2px); }

            .btn-reset { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
            .btn-reset:hover { background: #ef4444; color: white; }

            .btn-export { background: #3b82f6; color: white; }

            /* Scrollbar Custom */
            #sidebar::-webkit-scrollbar { width: 5px; }
            #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        </style>
    </head>
    <body>

        <header>
            <div class="header-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/logo_politeknik.png" 
                     onerror="this.src='https://seeklogo.com/images/P/politeknik-malaysia-logo-92E83E4C9F-seeklogo.com.png'" 
                     alt="Logo">
                <span class="site-title">Land<b>Explorer</b></span>
            </div>
        </header>

        <div id="main-container">
            <div id="map"></div>

            <div id="sidebar">
                <div class="sidebar-section">
                    <div class="section-header"><i class="fas fa-search-location"></i> Carian Lot</div>
                    <input type="text" id="searchBox" placeholder="Contoh: 1234...">
                    <button class="btn btn-search" onclick="searchLot()"><i class="fas fa-search"></i> Cari Sekarang</button>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-reset" onclick="location.reload()" style="flex:1;"><i class="fas fa-undo"></i> Reset</button>
                        <button class="btn btn-export" onclick="window.print()" style="flex:1;"><i class="fas fa-download"></i> PDF</button>
                    </div>
                </div>

                <div class="sidebar-section" id="data-container">
                    <div class="section-header"><i class="fas fa-fingerprint"></i> Maklumat Aset</div>
                    <div id="data-display">
                        <div style="text-align: center; padding: 20px; color: var(--text-muted);">
                            <i class="fas fa-mouse-pointer" style="font-size: 24px; margin-bottom: 10px; display: block;"></i>
                            Sila klik pada mana-mana lot di peta untuk paparan data.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/bklmerge_0.js"></script>
        <script src="data/finallot_1.js"></script>

        <script>
            var map = L.map('map', { zoomControl: true, maxZoom: 28 }).fitBounds([[2.1025, 102.5206], [2.1047, 102.5246]]);

            // Menggunakan Style Satelit yang lebih gelap & cantik
            var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, 
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: 'Google Satellite'
            }).addTo(map);

            function onEachFeature(feature, layer) {
                layer.on({
                    click: function(e) {
                        var props = feature.properties;
                        var paKey = Object.keys(props).find(k => k.toUpperCase().includes('PA')) || 'PA';
                        var lotKey = Object.keys(props).find(k => k.toUpperCase().includes('LOT')) || 'NO_LOT';
                        
                        var detailHtml = `
                            <div class="data-item">
                                <div class="data-label">NOMBOR LOT</div>
                                <div class="data-value highlight">${props[lotKey] || 'N/A'}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">NOMBOR PA</div>
                                <div class="data-value">${props[paKey] || 'N/A'}</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">PEMILIK BERDAFTAR</div>
                                <div class="data-value">POLITEKNIK MALAYSIA</div>
                            </div>
                            <div class="data-item">
                                <div class="data-label">KELUASAN (HEKTAR)</div>
                                <div class="data-value">${props.AREA || props.area || '0'} HA</div>
                            </div>
                        `;
                        document.getElementById('data-display').innerHTML = detailHtml;
                        
                        // Customizing Popup Style
                        layer.bindPopup("<b>Lot: " + props[lotKey] + "</b>").openPopup();
                        map.flyTo(e.latlng, 19);
                    },
                    mouseover: function(e) {
                        var layer = e.target;
                        layer.setStyle({ fillOpacity: 0.7, weight: 3, color: '#fff' });
                    },
                    mouseout: function(e) {
                        layer_finallot_1.resetStyle(e.target);
                    }
                });
            }

            var layer_finallot_1 = new L.geoJson(json_finallot_1, {
                onEachFeature: onEachFeature,
                style: { color: '#10b981', weight: 2, fillOpacity: 0.3, fillColor: '#10b981' }
            }).addTo(map);

            function searchLot() {
                var val = document.getElementById('searchBox').value;
                if(!val) return;
                layer_finallot_1.eachLayer(function(layer) {
                    if (layer.feature.properties.NO_LOT == val || layer.feature.properties.LOT == val) {
                        map.flyTo(layer.getBounds().getCenter(), 19);
                        layer.fire('click');
                    }
                });
            }
        </script>
    </body>
</html>
