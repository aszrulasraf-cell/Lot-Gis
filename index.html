<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Sistem Maklumat Lot Tanah Politeknik</title>

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>
            :root {
                --primary: #2ecc71;
                --sidebar-dark: #1a1c23;
                --card-dark: #242731;
            }

            html, body { width: 100%; height: 100%; padding: 0; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
            header { height: 65px; background-color: #2d5a27; display: flex; align-items: center; justify-content: center; z-index: 1002; position: relative; }
            .header-box { background: white; padding: 5px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; }
            .header-box img { height: 35px; }
            .site-title { font-size: 18px; color: #2d5a27; font-weight: 700; text-transform: uppercase; }

            #main-container { display: flex; height: calc(100vh - 65px); width: 100%; }
            #map { flex-grow: 1; height: 100%; background: #111; }

            #sidebar { width: 340px; background: var(--sidebar-dark); padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 1001; border-left: 1px solid #333; overflow-y: auto; }
            .sidebar-section { background: var(--card-dark); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
            .section-header { font-size: 11px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #bdc3c7; text-transform: uppercase; }

            .data-item { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #333; }
            .data-label { font-size: 9px; color: #7f8c8d; text-transform: uppercase; }
            .data-value { font-size: 15px; font-weight: bold; color: var(--primary); }

            input#searchBox { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; }
            .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
            .btn-search { background: #27ae60; margin-bottom: 8px; }
            .btn:hover { opacity: 0.8; }

            /* Legend Style */
            .legend { padding: 12px; background: rgba(26, 28, 35, 0.9); color: white; border-radius: 10px; border: 1px solid #444; line-height: 22px; }
            .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 2px; margin-top: 4px; }

            /* Chart Container */
            #chart-wrapper { width: 100%; height: 200px; margin-top: 10px; }
        </style>
    </head>
    <body>

        <header>
            <div class="header-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/logo_politeknik.png" alt="Logo">
                <span class="site-title">Land<b>Analytics</b></span>
            </div>
        </header>

        <div id="main-container">
            <div id="map"></div>

            <div id="sidebar">
                <div class="sidebar-section">
                    <div class="section-header"><i class="fas fa-search"></i> Carian Lot</div>
                    <input type="text" id="searchBox" placeholder="Contoh: 1023...">
                    <button class="btn btn-search" onclick="searchLot()"><i class="fas fa-search"></i> Cari Lot</button>
                </div>

                <div class="sidebar-section">
                    <div class="section-header"><i class="fas fa-chart-pie"></i> Analisis Keluasan</div>
                    <div id="data-display">
                        <p style="color:#7f8c8d; font-size:12px; text-align:center;">Klik lot untuk analisis.</p>
                    </div>
                    <div id="chart-wrapper">
                        <canvas id="lotChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/finallot_1.js"></script>

        <script>
            var map = L.map('map', { zoomControl: true }).fitBounds([[2.1025, 102.5206], [2.1047, 102.5246]]);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);

            // Legend
            var legend = L.control({position: 'bottomright'});
            legend.onAdd = function (map) {
                var div = L.DomUtil.create('div', 'legend');
                div.innerHTML = '<b>Petunjuk</b><br>' +
                                '<i style="background: #2ecc71"></i> Lot Aktif<br>' +
                                '<i style="background: #3498db"></i> Fasiliti Awam';
                return div;
            };
